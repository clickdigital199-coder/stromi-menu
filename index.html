<title>Stormi Italian Restaurant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111111;
    --bg2: #1a1a1a;
    --bg3: #222222;
    --card: #1e1e1e;
    --red: #e8432d;
    --red2: #c73520;
    --gold: #f0a500;
    --text: #ffffff;
    --text2: #aaaaaa;
    --text3: #666666;
    --border: #2a2a2a;
    --pill: #2c2c2c;
    --theme-transition: background 0.3s, color 0.3s, border-color 0.3s;
  }

  /* LIGHT MODE */
  body.theme-light {
    --bg: #f5f5f0;
    --bg2: #ececе6;
    --bg2: #e8e8e2;
    --bg3: #dededа;
    --bg3: #dededa;
    --card: #ffffff;
    --text: #111111;
    --text2: #555555;
    --text3: #999999;
    --border: #d0d0cc;
    --pill: #e0e0da;
  }

  /* NIGHT MODE (extra dark + warm tint) */
  body.theme-night {
    --bg: #0a0800;
    --bg2: #100e00;
    --bg3: #1a1700;
    --card: #141200;
    --text: #ffe9c0;
    --text2: #b89a6a;
    --text3: #6b5230;
    --border: #2a2400;
    --pill: #221e00;
    --gold: #ffb930;
  }

  html, body { transition: var(--theme-transition); }

  .theme-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--bg3); border: 1.5px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: background 0.2s, border-color 0.2s; margin-right: 4px; }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

  /* SCREENS */
  .screen { position: fixed; inset: 0; display: flex; flex-direction: column; transition: opacity 0.25s, transform 0.25s; }
  .screen.hidden { opacity: 0; pointer-events: none; transform: translateX(30px); }

  /* TOP BAR */
  /* HERO SLIDESHOW */
  .hero-slideshow { position: relative; width: 100%; height: 130px; overflow: hidden; flex-shrink: 0; }
  /* clip only the slide content not the controls */
  /* Fixed controls sit outside slideshow */
  #fixedControls { position: fixed; top: 10px; right: 10px; z-index: 300; display: flex; align-items: center; gap: 8px; }
  .hero-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.9s ease; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; }
  .hero-slide.active { opacity: 1; }
  .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.52) 100%); }
  .hero-caption { position: absolute; bottom: 10px; left: 14px; right: 50px; color: white; }
  .hero-caption h2 { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 700; line-height: 1.2; text-shadow: 0 1px 6px rgba(0,0,0,0.6); }
  .hero-caption p  { font-size: 10px; color: rgba(255,255,255,0.8); margin-top: 1px; }
  .hero-dots { position: absolute; bottom: 8px; right: 10px; display: flex; gap: 5px; }
  .hero-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.4); cursor: pointer; transition: background 0.3s, transform 0.3s; }
  .hero-dot.active { background: white; transform: scale(1.3); }
  /* Slide Manager Modal */
  .slide-mgr-btn { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); border-radius: 12px; padding: 9px 14px; font-size: 12px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: 'DM Sans', sans-serif; }
  /* Brand slide (slide 0 - Stormi header) */
  .hero-brand { position: absolute; inset: 0; opacity: 0; transition: opacity 0.9s ease; background: var(--bg2); display: flex; align-items: center; padding: 0 16px; gap: 14px; justify-content: space-between; }
  .hero-brand.active { opacity: 1; }
  .hero-brand-left { display: flex; align-items: center; gap: 10px; }
  .hero-brand-text small { font-size: 9px; font-weight: 600; color: var(--red); letter-spacing: 2px; text-transform: uppercase; display: block; }
  .hero-brand-text h1 { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.15; }
  .hero-brand-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .topbar { padding: 20px 24px 12px; display: flex; align-items: flex-end; justify-content: space-between; flex-shrink: 0; }
  .topbar-title small { font-size: 11px; font-weight: 500; color: var(--red); letter-spacing: 2px; text-transform: uppercase; display: block; margin-bottom: 2px; }
  .topbar-title h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: var(--text); }
  .lang-btn { background: #2a1a18; border: 1.5px solid var(--red2); border-radius: 10px; padding: 8px 14px; display: flex; align-items: center; gap: 6px; cursor: pointer; color: var(--text); font-size: 14px; font-weight: 500; }
  .lang-btn svg { width: 16px; height: 16px; }

  /* SEARCH */
  .search-wrap { padding: 8px 24px; flex-shrink: 0; }
  .search-box { background: var(--bg3); border-radius: 14px; display: flex; align-items: center; padding: 12px 16px; gap: 10px; }
  .search-box input { background: none; border: none; outline: none; color: var(--text); font-size: 16px; font-family: 'DM Sans', sans-serif; width: 100%; }
  .search-box input::placeholder { color: var(--text3); }
  .search-box svg { color: var(--text3); flex-shrink: 0; }

  /* CATEGORIES */
  .cats-wrap { padding: 12px 24px; flex-shrink: 0; }
  .cats { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
  .cats::-webkit-scrollbar { display: none; }
  .cat-pill { flex-shrink: 0; padding: 9px 18px; border-radius: 30px; background: var(--pill); color: var(--text2); font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 7px; border: 1.5px solid transparent; transition: all 0.2s; white-space: nowrap; }

  /* GRID */
  .menu-grid { flex: 1; overflow-y: auto; padding: 12px 16px 80px; scrollbar-width: thin; scrollbar-color: var(--bg3) transparent; }

  @media (min-width: 1000px) { .grid-inner { grid-template-columns: 1fr 1fr 1fr 1fr; } }

  /* FOOD CARD */
  .food-card { background: var(--card); border-radius: 16px; overflow: hidden; cursor: pointer; transition: transform 0.15s; }
  .food-card:active { transform: scale(0.97); }
  .food-card-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 48px; }
  .food-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .food-card-footer { display: flex; align-items: center; justify-content: space-between; }

  .food-arrow { width: 30px; height: 30px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .food-arrow svg { width: 14px; height: 14px; color: white; }

  /* BOTTOM NAV */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); display: flex; z-index: 100; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px 0 14px; cursor: pointer; gap: 4px; color: var(--text3); font-size: 12px; font-weight: 500; transition: color 0.2s; }
  .nav-item.active { color: var(--red); }
  .nav-item svg { width: 22px; height: 22px; }

  /* DETAIL SCREEN */
  .detail-img { width: 100%; height: 360px; object-fit: cover; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 80px; flex-shrink: 0; }
  .detail-img img { width: 100%; height: 100%; object-fit: cover; }
  .detail-body { flex: 1; overflow-y: auto; padding: 24px; }
  .detail-back { position: absolute; top: 20px; left: 16px; width: 38px; height: 38px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; }
  .detail-back svg { width: 20px; height: 20px; color: white; }
  .detail-cat-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(232,67,45,0.15); color: var(--red); font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 20px; margin-bottom: 12px; letter-spacing: 0.5px; }
  .detail-name { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 10px; line-height: 1.2; }
  .detail-price { font-size: 22px; font-weight: 700; color: var(--gold); margin-bottom: 16px; }
  .detail-divider { height: 1px; background: var(--border); margin: 16px 0; }
  .detail-desc { font-size: 15px; color: var(--text2); line-height: 1.7; }

  /* LANGUAGE MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-box { background: #2a2a2a; border-radius: 20px; width: 320px; overflow: hidden; }
  .modal-title { font-size: 17px; font-weight: 600; text-align: center; padding: 20px; border-bottom: 1px solid var(--border); }
  .lang-option { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; cursor: pointer; transition: background 0.15s; }
  .lang-option:hover { background: var(--bg3); }
  .lang-option.selected { background: rgba(232,67,45,0.1); }
  .lang-left { display: flex; align-items: center; gap: 12px; font-size: 16px; }
  .lang-left.selected { color: var(--red); font-weight: 600; }
  .check-circle { width: 22px; height: 22px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .check-circle svg { width: 13px; height: 13px; color: white; }
  .lang-option + .lang-option { border-top: 1px solid var(--border); }

  /* ADMIN SCREEN */
  .admin-header { padding: 20px 24px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; border-bottom: 1px solid var(--border); }
  .admin-header h2 { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; }
  .add-btn { background: var(--red); color: white; border: none; border-radius: 12px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: 'DM Sans', sans-serif; }
  .admin-list { flex: 1; overflow-y: auto; padding: 16px; }
  .admin-item { background: var(--card); border-radius: 14px; display: flex; align-items: center; gap: 14px; padding: 12px; margin-bottom: 10px; }
  .admin-item-img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; background: var(--bg3); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; overflow: hidden; }
  .admin-item-img img { width: 100%; height: 100%; object-fit: cover; }
  .admin-item-info { flex: 1; min-width: 0; }
  .admin-item-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .admin-item-meta { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .admin-item-price { font-size: 14px; font-weight: 700; color: var(--gold); margin-top: 4px; }
  .admin-actions { display: flex; gap: 8px; }
  .edit-btn { width: 34px; height: 34px; border-radius: 8px; background: var(--bg3); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .del-btn { width: 34px; height: 34px; border-radius: 8px; background: rgba(232,67,45,0.15); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .edit-btn svg, .del-btn svg { width: 16px; height: 16px; }
  .edit-btn svg { color: var(--text2); }
  .del-btn svg { color: var(--red); }

  /* ADD/EDIT FORM */
  .form-screen { background: var(--bg); }
  .form-header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .form-header h3 { font-size: 18px; font-weight: 600; }
  .back-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px; color: var(--text2); font-size: 15px; font-family: 'DM Sans', sans-serif; }
  .save-btn { background: var(--red); color: white; border: none; border-radius: 10px; padding: 9px 20px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .form-body { flex: 1; overflow-y: auto; padding: 20px; }
  .img-pick-area { background: var(--bg3); border-radius: 16px; height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--text3); margin-bottom: 14px; overflow: hidden; cursor: pointer; }
  .img-pick-area img { width: 100%; height: 100%; object-fit: cover; }
  .img-pick-area svg { width: 40px; height: 40px; }
  .img-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .img-pick-btn { padding: 12px; border-radius: 12px; background: var(--bg3); border: none; color: var(--text); cursor: pointer; font-size: 14px; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 500; }
  .img-pick-btn.red { color: #ff6b4a; }
  .img-pick-btn.amber { color: var(--gold); }
  .form-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; margin-top: 18px; display: block; }
  .form-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 13px 16px; color: var(--text); font-size: 15px; font-family: 'DM Sans', sans-serif; outline: none; }
  .form-input:focus { border-color: var(--red); }
  .form-input::placeholder { color: var(--text3); }
  .form-textarea { min-height: 90px; resize: vertical; }
  .form-cats { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
  .form-cat-pill { padding: 8px 16px; border-radius: 20px; background: var(--pill); color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid transparent; transition: all 0.15s; }
  .form-cat-pill.active { background: var(--red); color: white; }

  /* EMPTY STATE */
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--text3); gap: 12px; }
  .empty svg { width: 48px; height: 48px; }
  .empty p { font-size: 16px; }

  /* TOAST */
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: #333; color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 500; z-index: 300; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* HIDDEN FILE INPUT */
  #fileInput { display: none; }

  .pin-key { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 20px; font-weight: 600; font-family: 'DM Sans', sans-serif; height: 60px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.1s; }
  .pin-key:active { background: var(--red); color: white; }

  .sync-bar { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: var(--red); z-index: 500; transform: scaleX(0); transform-origin: left; transition: transform 0.4s; }
  .sync-bar.loading { transform: scaleX(0.7); }
  .sync-bar.done { transform: scaleX(1); transition: transform 0.2s; }
  .sync-indicator { position: fixed; top: 8px; right: 80px; background: rgba(0,0,0,0.7); color: #aaa; font-size: 11px; padding: 4px 10px; border-radius: 20px; z-index: 400; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .sync-indicator.show { opacity: 1; }

  /* CATEGORY MANAGER */
  .cat-mgr-btn { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); border-radius: 12px; padding: 10px 16px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: 'DM Sans', sans-serif; }
  .cat-mgr-btn svg { width: 15px; height: 15px; }
  .cat-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 250; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .cat-modal-overlay.open { opacity: 1; pointer-events: all; }
  .cat-modal-box { background: #1e1e1e; border-radius: 24px 24px 0 0; width: 100%; max-width: 560px; max-height: 85vh; display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom, 0); transform: translateY(30px); transition: transform 0.25s; }
  .cat-modal-overlay.open .cat-modal-box { transform: translateY(0); }
  .cat-modal-header { padding: 20px 20px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .cat-modal-header h3 { font-size: 17px; font-weight: 700; font-family: 'Playfair Display', serif; }
  .cat-modal-close { background: var(--bg3); border: none; color: var(--text2); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .cat-modal-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
  .cat-mgr-row { background: var(--card); border-radius: 14px; display: flex; align-items: center; gap: 12px; padding: 12px 14px; margin-bottom: 10px; }
  .cat-mgr-icon { font-size: 26px; width: 42px; text-align: center; flex-shrink: 0; }
  .cat-mgr-info { flex: 1; min-width: 0; }
  .cat-mgr-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .cat-mgr-id { font-size: 11px; color: var(--text3); margin-top: 2px; letter-spacing: 0.5px; }
  .cat-mgr-actions { display: flex; gap: 8px; }
  .cat-add-row { padding: 12px 16px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .cat-add-row h4 { font-size: 12px; font-weight: 600; color: var(--text3); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 10px; }
  .cat-add-fields { display: grid; grid-template-columns: 64px 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .cat-add-fields input { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; width: 100%; }
  .cat-add-fields input:focus { border-color: var(--red); }
  .cat-add-fields input::placeholder { color: var(--text3); }
  .cat-add-btn { width: 100%; background: var(--red); color: white; border: none; border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }

  /* INLINE EDIT ROW */
  .cat-edit-row { background: rgba(232,67,45,0.07); border: 1.5px solid var(--red); border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; }
  .cat-edit-fields { display: grid; grid-template-columns: 64px 1fr; gap: 8px; margin-bottom: 8px; }
  .cat-edit-row-btns { display: flex; gap: 8px; }
  .cat-edit-save { flex: 1; background: var(--red); color: white; border: none; border-radius: 10px; padding: 9px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .cat-edit-cancel { flex: 1; background: var(--bg3); color: var(--text2); border: none; border-radius: 10px; padding: 9px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="sync-bar" id="syncBar"></div>

<!-- FIXED CONTROLS: theme + language, always visible regardless of slide -->
<div id="fixedControls">
  <button class="theme-btn" id="themeBtnMain" onclick="cycleTheme()" title="Toggle theme"></button>
  <div class="lang-btn" onclick="openLang()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    <span id="langLabel">EN</span>
  </div>
</div>
<div class="sync-indicator" id="syncIndicator">Syncing...</div>

<!-- LANGUAGE MODAL -->
<div class="modal-overlay" id="langModal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">Language</div>
    <div class="lang-option selected" onclick="setLang('en')">
      <div class="lang-left selected" id="li-en">🇬🇧 English</div>
      <div class="check-circle" id="lc-en"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
    </div>
    <div class="lang-option" onclick="setLang('am')">
      <div class="lang-left" id="li-am">🇪🇹 አማርኛ (Amharic)</div>
      <div class="check-circle" style="background:transparent;" id="lc-am"></div>
    </div>
    <div class="lang-option" onclick="setLang('or')">
      <div class="lang-left" id="li-or">🇪🇹 Afaan Oromoo</div>
      <div class="check-circle" style="background:transparent;" id="lc-or"></div>
    </div>
  </div>
</div>


<!-- PIN MODAL -->
<div class="modal-overlay" id="pinModal">
  <div class="modal-box" style="width:300px;padding:24px;">
    <div style="text-align:center;margin-bottom:20px;">
      <div style="width:52px;height:52px;background:rgba(232,67,45,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <div style="font-size:17px;font-weight:600;color:var(--text);">Admin Access</div>
      <div style="font-size:13px;color:var(--text3);margin-top:4px;">Enter PIN to continue</div>
    </div>
    <div style="display:flex;justify-content:center;gap:7px;margin-bottom:20px;" id="pinDots">
      <div style="width:11px;height:11px;border-radius:50%;background:var(--border);transition:background 0.2s;" id="dot0"></div>
      <div style="width:11px;height:11px;border-radius:50%;background:var(--border);transition:background 0.2s;" id="dot1"></div>
      <div style="width:11px;height:11px;border-radius:50%;background:var(--border);transition:background 0.2s;" id="dot2"></div>
      <div style="width:11px;height:11px;border-radius:50%;background:var(--border);transition:background 0.2s;" id="dot3"></div>
      <div style="width:11px;height:11px;border-radius:50%;background:var(--border);transition:background 0.2s;" id="dot4"></div>
      <div style="width:11px;height:11px;border-radius:50%;background:var(--border);transition:background 0.2s;" id="dot5"></div>
      <div style="width:11px;height:11px;border-radius:50%;background:var(--border);transition:background 0.2s;" id="dot6"></div>
      <div style="width:11px;height:11px;border-radius:50%;background:var(--border);transition:background 0.2s;" id="dot7"></div>
      <div style="width:11px;height:11px;border-radius:50%;background:var(--border);transition:background 0.2s;" id="dot8"></div>
      <div style="width:11px;height:11px;border-radius:50%;background:var(--border);transition:background 0.2s;" id="dot9"></div>
    </div>
    <div id="pinError" style="text-align:center;color:var(--red);font-size:13px;min-height:18px;margin-bottom:10px;"></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
      <button class="pin-key" onclick="pinPress('1')">1</button>
      <button class="pin-key" onclick="pinPress('2')">2</button>
      <button class="pin-key" onclick="pinPress('3')">3</button>
      <button class="pin-key" onclick="pinPress('4')">4</button>
      <button class="pin-key" onclick="pinPress('5')">5</button>
      <button class="pin-key" onclick="pinPress('6')">6</button>
      <button class="pin-key" onclick="pinPress('7')">7</button>
      <button class="pin-key" onclick="pinPress('8')">8</button>
      <button class="pin-key" onclick="pinPress('9')">9</button>
      <button class="pin-key" onclick="pinClear()" style="background:var(--bg3);color:var(--text2);font-size:13px;">CLR</button>
      <button class="pin-key" onclick="pinPress('0')">0</button>
      <button class="pin-key" onclick="pinBack()" style="background:var(--bg3);color:var(--text2);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12H3M3 12l7-7M3 12l7 7"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- HIDDEN FILE INPUT -->
<input type="file" id="fileInput" accept="image/*">

<!-- ===== MENU SCREEN ===== -->
<div class="screen" id="menuScreen">
  <!-- SLIDESHOW: slide 0 = Stormi brand, slides 1+ = food -->
  <div class="hero-slideshow" id="heroSlideshow">

<!-- ===== ADMIN SCREEN ===== -->
<div class="screen hidden" id="adminScreen">
  <div class="admin-header">
    <h2 id="t-admin">Admin Panel</h2>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <button class="cat-mgr-btn" onclick="openCatModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
        Categories
      </button>
      <button class="cat-mgr-btn" onclick="openSlideModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        Slides
      </button>
      <button class="cat-mgr-btn" onclick="exportBackup()" style="color:#4caf50;border-color:#4caf50;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Backup
      </button>
      <label class="cat-mgr-btn" style="cursor:pointer;color:#2196f3;border-color:#2196f3;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Restore
        <input type="file" accept=".json" style="display:none;" onchange="importBackup(this)">
      </label>
      <button class="cat-mgr-btn" id="adminSaveBtn" onclick="saveAdminData()" style="color:#f0a500;border-color:#f0a500;display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save
      </button>
      <button class="add-btn" onclick="showAddForm(null)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span id="t-additem">Add Item</span>
      </button>
    </div>
  </div>
  <div class="admin-list" id="adminList"></div>
</div>

<!-- ===== ADD/EDIT FORM SCREEN ===== -->
<div class="screen hidden" id="formScreen" style="background:var(--bg);z-index:60;">
  <div class="form-header">
    <button class="back-btn" onclick="showScreen('admin')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      <span id="t-addItem2">Add Item</span>
    </button>
    <button class="save-btn" onclick="saveItem()" id="t-save" style="background:var(--red);font-size:15px;padding:10px 24px;font-weight:700;">💾 Save</button>
  </div>
  <div class="form-body">
    <div class="img-pick-area" id="imgPreview" onclick="document.getElementById('fileInput').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <span id="t-pickImg">Pick Image</span>
    </div>
    <div class="img-btns">
      <button class="img-pick-btn red" onclick="document.getElementById('fileInput').click()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span id="t-pickImg2">Pick Image</span>
      </button>
      <button class="img-pick-btn amber" onclick="document.getElementById('fileInput').click()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <span id="t-takePhoto">Take Photo</span>
      </button>
    </div>

    <label class="form-label" id="t-catLabel">CATEGORY</label>
    <div class="form-cats" id="formCats"></div>

    <label class="form-label" id="t-priceLabel">PRICE (ETB)</label>
    <input type="number" class="form-input" id="f-price" placeholder="0.00" step="0.01">

    <label class="form-label" id="t-nameEn">NAME (ENGLISH) *</label>
    <input type="text" class="form-input" id="f-nameEn" placeholder="e.g. Grilled Chicken">

    <label class="form-label" id="t-nameAm">NAME (AMHARIC)</label>
    <input type="text" class="form-input" id="f-nameAm" placeholder="e.g. የተጠበሰ ዶሮ">

    <label class="form-label" id="t-nameOr">NAME (AFAAN OROMO)</label>
    <input type="text" class="form-input" id="f-nameOr" placeholder="e.g. Lukkuu Gubyame">

    <label class="form-label" id="t-descEn">DESCRIPTION (ENGLISH)</label>
    <textarea class="form-input form-textarea" id="f-descEn" placeholder="Enter English description..."></textarea>

    <label class="form-label" id="t-descAm">DESCRIPTION (AMHARIC)</label>
    <textarea class="form-input form-textarea" id="f-descAm" placeholder="ማብራሪያ ያስገቡ..."></textarea>

    <label class="form-label" id="t-descOr">DESCRIPTION (AFAAN OROMO)</label>
    <textarea class="form-input form-textarea" id="f-descOr" placeholder="Ibsa galchi..."></textarea>

    <!-- BIG SAVE BUTTON AT BOTTOM -->
    <button onclick="saveItem()" style="width:100%;margin-top:24px;margin-bottom:40px;background:var(--red);color:white;border:none;border-radius:16px;padding:18px;font-size:17px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 20px rgba(232,67,45,0.4);">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      SAVE ITEM
    </button>
  </div>
</div>

<!-- CATEGORY MANAGER MODAL -->
<div class="cat-modal-overlay" id="catModal">
  <div class="cat-modal-box">
    <div class="cat-modal-header">
      <h3>Manage Categories</h3>
      <button class="cat-modal-close" onclick="closeCatModal()">✕</button>
    </div>
    <div class="cat-modal-list" id="catMgrList"></div>

      <h4>Add New Category</h4>

        <input type="text" id="newCatIcon" placeholder="🍽️" maxlength="4">
        <input type="text" id="newCatEn" placeholder="Name (English) *">
        <input type="text" id="newCatAm" placeholder="ስም (አማርኛ)">
      </div>
      <div class="cat-add-fields" style="grid-template-columns:1fr;margin-bottom:10px;">
        <input type="text" id="newCatOr" placeholder="Maqaa (Afaan Oromoo)">
      </div>
      <button class="cat-add-btn" onclick="addCategory()">+ Add Category</button>
    </div>

</div>

<!-- SLIDE MANAGER MODAL -->
<div class="cat-modal-overlay" id="slideMgrModal">
  <div class="cat-modal-box">
    <div class="cat-modal-header">
      <h3>Manage Slideshow</h3>
      <button class="cat-modal-close" onclick="closeSlideModal()">✕</button>
    </div>
    <div class="cat-modal-list" id="slideMgrList"></div>
    <!-- Edit/Add Panel -->
    <div id="slideEditPanel" style="display:none;padding:12px 16px;border-top:1px solid var(--border);background:rgba(232,67,45,0.06);border-radius:0 0 24px 24px;">
      <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:10px;" id="slideEditTitle">Add Slide</div>
      <div style="display:grid;grid-template-columns:54px 1fr;gap:8px;margin-bottom:8px;">
        <input type="text" id="sld-emoji" placeholder="🍕" maxlength="4"
          style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-size:18px;font-family:inherit;outline:none;text-align:center;">
        <input type="text" id="sld-title" placeholder="Slide title *"
          style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-size:14px;font-family:inherit;outline:none;">
      </div>
      <input type="text" id="sld-sub" placeholder="Subtitle / description"

// 🔴 REPLACE THESE VALUES with your own Firebase project config
const FIREBASE_CONFIG = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

let db = null;
let firebaseReady = false;
let unsubscribe = null;

function initFirebase() {
  try {
    if (!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY') {
      console.log('Firebase not configured - running in offline mode');
      return;
    }
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    db.enablePersistence({ synchronizeTabs: true }).catch(() => {});
    firebaseReady = true;
    startSync();
  } catch(e) {
    console.log('Firebase init failed, offline mode:', e);
  }
}

function startSync() {
  if (!db) return;
  showSyncIndicator('Syncing...');
  unsubscribe = db.collection('menu').doc('items')
    .onSnapshot(doc => {
      if (doc.exists) {
        const data = doc.data();
        if (data && data.items) {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data.items));
          renderMenu();
          renderAdmin();
          renderCats();
        }
      }
      hideSyncIndicator();
    }, err => {
      console.log('Sync error:', err);
      hideSyncIndicator();
    });

  db.collection('menu').doc('categories')
    .onSnapshot(doc => {
      if (doc.exists) {
        const data = doc.data();
        if (data && data.categories) {
          localStorage.setItem(CATS_KEY, JSON.stringify(data.categories));
          CATEGORIES = data.categories;
          renderCats();
          renderFormCats();
        }
      }
    }, err => console.log('Categories sync error:', err));

  db.collection('menu').doc('slides')
    .onSnapshot(doc => {
      if (doc.exists) {
        const data = doc.data();
        if (data && data.slides) {
          localStorage.setItem(SLIDES_KEY, JSON.stringify(data.slides));
          initSlideshow();
        }
      }
    }, err => console.log('Slides sync error:', err));
}

function pushToFirebase(items) {
  if (!db || !firebaseReady) return;
  db.collection('menu').doc('items').set({ items, updatedAt: new Date().toISOString() })
    .then(() => showToast('✓ Synced to all tablets'))
    .catch(e => console.log('Push failed:', e));
}

function pushCategoriesToFirebase(cats) {
  if (!db || !firebaseReady) return;
  db.collection('menu').doc('categories').set({ categories: cats, updatedAt: new Date().toISOString() })
    .then(() => showToast('✓ Categories synced'))
    .catch(e => console.log('Categories push failed:', e));
}

function pushSlidesToFirebase(slides) {
  if (!db || !firebaseReady) return;
  db.collection('menu').doc('slides').set({ slides, updatedAt: new Date().toISOString() })
    .then(() => showToast('✓ Slides synced'))
    .catch(e => console.log('Slides push failed:', e));
}

function showSyncIndicator(msg) {
  const el = document.getElementById('syncIndicator');
  const bar = document.getElementById('syncBar');
  el.textContent = msg; el.classList.add('show');
  bar.classList.add('loading');
}
function hideSyncIndicator() {
  setTimeout(() => {
    document.getElementById('syncIndicator').classList.remove('show');
    const bar = document.getElementById('syncBar');
    bar.classList.remove('loading'); bar.classList.add('done');
    setTimeout(() => bar.classList.remove('done'), 400);
  }, 800);
}

// ===== PIN =====
const CORRECT_PIN = '1160601997';
let pinEntry = '';

function requestAdmin() {
  pinEntry = '';
  updatePinDots();
  document.getElementById('pinError').textContent = '';
  document.getElementById('pinModal').classList.add('open');
}

let pinAttempts = 0;
let pinLocked = false;
let pinLockTimer = null;

function pinPress(d) {
  if (pinLocked) return;
  if (pinEntry.length >= 10) return;
  pinEntry += d;
  updatePinDots();
  if (pinEntry.length === 10) {
    setTimeout(() => {
      if (pinEntry === CORRECT_PIN) {
        pinAttempts = 0;
        document.getElementById('pinModal').classList.remove('open');
        showScreen('admin');
      } else {
        pinAttempts++;
        pinEntry = '';
        updatePinDots();
        if (pinAttempts >= 3) {
          pinLocked = true;
          let secs = 30;
          document.getElementById('pinError').textContent = 'Too many attempts. Wait 30s...';
          pinLockTimer = setInterval(() => {
            secs--;
            document.getElementById('pinError').textContent = `Too many attempts. Wait ${secs}s...`;
            if (secs <= 0) {
              clearInterval(pinLockTimer);
              pinLocked = false;
              pinAttempts = 0;
              document.getElementById('pinError').textContent = '';
            }
          }, 1000);
        } else {
          const left = 3 - pinAttempts;
          document.getElementById('pinError').textContent = `Wrong PIN. ${left} attempt${left===1?'':'s'} left.`;
          setTimeout(() => { document.getElementById('pinError').textContent = ''; }, 1500);
        }
      }
    }, 150);
  }
}

function pinBack() {
  pinEntry = pinEntry.slice(0, -1);
  updatePinDots();
}

function pinClear() {
  pinEntry = '';
  updatePinDots();
}

function updatePinDots() {
  for (let i = 0; i < 10; i++) {
    document.getElementById('dot'+i).style.background = i < pinEntry.length ? 'var(--red)' : 'var(--border)';
  }
}

document.getElementById('pinModal').addEventListener('click', function(e) {
  if (e.target === this) { this.classList.remove('open'); pinEntry = ''; updatePinDots(); }
});

    });

];
const SLIDES_KEY = 'stormiSlides';
function getSlides() { try { return JSON.parse(localStorage.getItem(SLIDES_KEY)) || DEFAULT_SLIDES; } catch { return DEFAULT_SLIDES; } }
function saveSlides(s) { localStorage.setItem(SLIDES_KEY, JSON.stringify(s)); pushSlidesToFirebase(s); }

let slideIdx = 0, slideTimer = null;
// total slides = 1 brand + food slides
function totalSlides() { return 1 + getSlides().length; }

function initSlideshow() {
  const dotsEl = document.getElementById('heroDots');
  if (!dotsEl) return;
  const slides = getSlides();
  const total = 1 + slides.length;
  // Render food slides (brand slide 0 already in HTML)
  // Remove old food slides first
  document.querySelectorAll('.hero-slide').forEach(e => e.remove());
  const container = document.getElementById('heroSlideshow');
  // Insert food slides before dots
  slides.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'hero-slide';
    div.id = 'slide' + (i + 1);
    if (s.photo) {
      div.style.backgroundImage = 'url(' + s.photo + ')';
      div.style.backgroundSize = 'cover';
      div.style.backgroundPosition = 'center';
    } else {
      div.style.background = s.bg;
      div.innerHTML = '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:70px;opacity:0.18;user-select:none;">' + s.emoji + '</div>';
    }
    div.innerHTML += '<div class="hero-overlay"></div><div class="hero-caption"><h2>' + s.title + '</h2><p>' + s.sub + '</p></div>';
    container.insertBefore(div, dotsEl);
  });
  // Dots
  dotsEl.innerHTML = Array.from({length: total}, (_, i) =>
    '<div class="hero-dot' + (i===0?' active':'') + '" onclick="goSlide(' + i + ')" id="dot' + i + '"></div>'
  ).join('');
  slideIdx = 0;
  clearInterval(slideTimer);
  slideTimer = setInterval(nextSlide, 4000);
}

function goSlide(n) {
  const total = totalSlides();
  const prev = slideIdx;
  slideIdx = ((n % total) + total) % total;
  const prevEl = document.getElementById('slide' + prev) || document.querySelector('.hero-brand');
  const nextEl = slideIdx === 0 ? document.querySelector('.hero-brand') : document.getElementById('slide' + slideIdx);
  if (prevEl) prevEl.classList.remove('active');
  document.getElementById('dot' + prev)?.classList.remove('active');
  if (nextEl) nextEl.classList.add('active');
  document.getElementById('dot' + slideIdx)?.classList.add('active');
}
function nextSlide() { goSlide(slideIdx + 1); }

function saveSlideEdit() {
  const emoji = document.getElementById('sld-emoji').value.trim() || '🍽️';
  const title = document.getElementById('sld-title').value.trim();
  const sub   = document.getElementById('sld-sub').value.trim();
  const bg    = document.getElementById('sld-bg').value.trim() || 'linear-gradient(135deg,#c0392b,#922b21)';
  if (!title) { showToast('⚠️ Title required'); return; }
  let slides = getSlides();
  if (editingSlideId) {
    const idx = slides.findIndex(x => x.id === editingSlideId);
    if (idx !== -1) { slides[idx] = {...slides[idx], emoji, title, sub, bg}; }
  } else {
    slides.push({ id: 'sl_'+Date.now(), type:'food', emoji, title, sub, bg, photo:'' });
  }
  saveSlides(slides);
  document.getElementById('slideEditPanel').style.display = 'none';
  editingSlideId = null;
  renderSlideMgrList();
  initSlideshow();
  showToast('✓ Slide saved');
}

const THEME_ORDER = ['dark', 'light', 'night'];
let currentTheme = localStorage.getItem(THEME_KEY) || 'dark';

function setTheme(t) {
  currentTheme = t;
  localStorage.setItem(THEME_KEY, t);
  document.body.classList.remove('theme-light', 'theme-night');
  if (t === 'light') document.body.classList.add('theme-light');
  if (t === 'night') document.body.classList.add('theme-night');
  const btn = document.getElementById('themeBtnMain');
  if (btn) btn.textContent = THEME_ICONS[t];
}

function cycleTheme() {
  const idx = THEME_ORDER.indexOf(currentTheme);
  setTheme(THEME_ORDER[(idx + 1) % THEME_ORDER.length]);
}

// Apply on load
setTheme(currentTheme);

// ===== CATEGORY MANAGER =====
let editingCatId = null;

function openCatModal() {
  editingCatId = null;
  renderCatMgrList();
  document.getElementById('catModal').classList.add('open');
}
function closeCatModal() {
  document.getElementById('catModal').classList.remove('open');
  editingCatId = null;
}
document.getElementById('catModal').addEventListener('click', function(e) {
  if (e.target === this) closeCatModal();
});

function renderCatMgrList() {
  CATEGORIES = getCategories();
  const list = document.getElementById('catMgrList');
  if (!CATEGORIES.length) {
    list.innerHTML = '<div class="empty" style="padding:30px 0"><p>No categories yet</p></div>';
    return;
  }
  list.innerHTML = CATEGORIES.map(c => {
    if (editingCatId === c.id) {
      return `
        <div class="cat-edit-row" id="editRow-${c.id}">
          <div class="cat-edit-fields">
            <input type="text" id="ei-icon" value="${c.icon}" placeholder="🍽️" maxlength="4"
              style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-size:18px;font-family:inherit;outline:none;width:100%;text-align:center;">
            <input type="text" id="ei-en" value="${c.labelEn}" placeholder="English name"
              style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-size:14px;font-family:inherit;outline:none;width:100%;">
          </div>
          <div class="cat-edit-fields" style="grid-template-columns:1fr 1fr;margin-bottom:8px;">
            <input type="text" id="ei-am" value="${c.labelAm}" placeholder="አማርኛ"
              style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-size:14px;font-family:inherit;outline:none;width:100%;">
            <input type="text" id="ei-or" value="${c.labelOr}" placeholder="Afaan Oromoo"
              style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-size:14px;font-family:inherit;outline:none;width:100%;">
          </div>
          <div class="cat-edit-row-btns">
            <button class="cat-edit-cancel" onclick="editingCatId=null;renderCatMgrList()">Cancel</button>
            <button class="cat-edit-save" onclick="saveCatEdit('${c.id}')">Save Changes</button>
          </div>
        </div>`;
    }
    return `
      <div class="cat-mgr-row">
        <div class="cat-mgr-icon">${c.icon}</div>
        <div class="cat-mgr-info">
          <div class="cat-mgr-name">${c.labelEn}</div>
          <div class="cat-mgr-id">${c.labelAm} · ${c.labelOr}</div>
        </div>
        <div class="cat-mgr-actions">
          <button class="edit-btn" onclick="editingCatId='${c.id}';renderCatMgrList()" title="Edit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="del-btn" onclick="deleteCat('${c.id}')" title="Delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
      </div>`;
  }).join('');
}

function saveCatEdit(id) {
  const icon = document.getElementById('ei-icon').value.trim() || '🍽️';
  const en   = document.getElementById('ei-en').value.trim();
  const am   = document.getElementById('ei-am').value.trim();
  const or_  = document.getElementById('ei-or').value.trim();
  if (!en) { showToast('⚠️ English name is required'); return; }
  let cats = getCategories();
  const idx = cats.findIndex(c => c.id === id);
  if (idx !== -1) {
    cats[idx] = { ...cats[idx], icon, labelEn: en, labelAm: am, labelOr: or_ };
    saveCategories(cats);
    CATEGORIES = cats;
  }
  editingCatId = null;
  renderCatMgrList();
  renderCats();
  renderFormCats();
  showToast('✓ Category updated');
}

function deleteCat(id) {
  const items = getItems();
  const inUse = items.some(i => i.category === id);
  if (inUse) {
    showToast('⚠️ Category is used by menu items');
    return;
  }
  if (!confirm('Delete this category?')) return;
  let cats = getCategories().filter(c => c.id !== id);
  saveCategories(cats);
  CATEGORIES = cats;
  if (activeCategory === id) activeCategory = 'all';
  renderCatMgrList();
  renderCats();
  renderFormCats();
  showToast('🗑️ Category deleted');
}

function addCategory() {
  const icon = document.getElementById('newCatIcon').value.trim() || '🍽️';
  const en   = document.getElementById('newCatEn').value.trim();
  const am   = document.getElementById('newCatAm').value.trim();
  const or_  = document.getElementById('newCatOr').value.trim();
  if (!en) { showToast('⚠️ English name is required'); return; }
  const id = en.toLowerCase().replace(/[^a-z0-9]/g, '') + '_' + Date.now();
  let cats = getCategories();
  cats.push({ id, icon, labelEn: en, labelAm: am || en, labelOr: or_ || en });
  saveCategories(cats);
  CATEGORIES = cats;
  document.getElementById('newCatIcon').value = '';
  document.getElementById('newCatEn').value = '';
  document.getElementById('newCatAm').value = '';
  document.getElementById('newCatOr').value = '';
  renderCatMgrList();
  renderCats();
  renderFormCats();
  showToast('✓ Category added');
}

// ===== BACKUP & RESTORE =====
function exportBackup() {
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    items:      localStorage.getItem('hotelMenuItems')      || '[]',
    categories: localStorage.getItem('hotelMenuCategories') || '[]',
    slides:     localStorage.getItem('stormiSlides')        || '[]',
    theme:      localStorage.getItem('stormiTheme')         || 'dark',
    lang:       localStorage.getItem('stormiLang')          || 'en',
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  a.href     = url;
  a.download = 'stormi-backup-' + date + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✅ Backup downloaded!');
}

function importBackup(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.version) { showToast('⚠️ Invalid backup file'); return; }
      if (!confirm('Restore backup from ' + (data.exportedAt || 'unknown date') + '?\n\nThis will replace all current menu data.')) return;
      if (data.items)      localStorage.setItem('hotelMenuItems',      data.items);
      if (data.categories) localStorage.setItem('hotelMenuCategories', data.categories);
      if (data.slides)     localStorage.setItem('stormiSlides',        data.slides);
      if (data.theme)      localStorage.setItem('stormiTheme',         data.theme);
      if (data.lang)       localStorage.setItem('stormiLang',          data.lang);
      // Reload everything
      CATEGORIES = getCategories();
      setTheme(data.theme || 'dark');
      applyLang();
      renderCats();
      renderMenu();
      renderAdmin();
      initSlideshow();
      showToast('✅ Backup restored successfully!');
    } catch(err) {
      showToast('⚠️ Could not read backup file');
    }
    input.value = '';
  };
  reader.readAsText(file);
}

// ===== INIT =====
initFirebase();
applyLang();
renderCats();
renderMenu();
initSlideshow();
</script>

<script>
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'stormi-menu-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(clients.claim());
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).catch(() => r))
      );
    });
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).then(() => {
    console.log('SW registered');
  }).catch(e => console.log('SW error:', e));
}

// Also trigger install prompt
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  window._installPrompt = e;
  document.getElementById('installBanner').style.display = 'flex';
});

window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').style.display = 'none';
});
</script>
